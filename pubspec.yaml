name: mepco_esafety_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+30

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  dropdown_search: ^5.0.6
  animated_text_kit: ^4.2.2
  flutter_image_compress: ^2.2.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.4
  path_provider: ^2.1.3
  get: ^4.6.6
  http: ^1.2.1
  shared_preferences: ^2.2.3
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  open_filex: ^4.3.4
  device_info_plus: ^9.0.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  multi_select_flutter: ^4.1.3
  flutter_map: ^6.1.0
  google_maps_flutter: ^2.10.0
  intl: ^0.19.0
  latlong2: ^0.9.1
  geolocator: ^13.0.3
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  native_exif: ^0.6.2
  image: ^4.2.0
  geocoding: ^3.0.0
  share_plus: ^10.0.0
  gal: ^2.3.0
  alarm: ^5.1.5
  mailer: ^6.0.1
  cupertino_icons: ^1.0.8
  flutter_map_tile_caching: ^9.0.1
  permission_handler: ^11.4.0
  fl_chart: ^0.68.0
  page_view_indicators: ^2.0.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icon/
    - assets/animations/

  fonts:
    - family: Fixture
      fonts:
        - asset: assets/fonts/fixture.otf
    - family: Jameel Noori Nastaleeq
      fonts:
        - asset: assets/fonts/Jameel_Noori_Nastaleeq.ttf